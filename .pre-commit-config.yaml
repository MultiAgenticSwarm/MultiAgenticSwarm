# Pre-commit configuration for MultiAgenticSwarm
# Minimal version to avoid Python environment issues

repos:
  # Python formatting using local installations
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: [--line-length=88]
        require_serial: true
      - id: isort
        name: isort
        entry: isort
        language: system
        types: [python]
        args: [--profile=black]
        require_serial: true

# Global exclusions
exclude: |
  (?x)^(
    .*/__pycache__/.*|
    .*/\.git/.*|
    .*/build/.*|
    .*/dist/.*|
    .*\.egg-info/.*|
    logs/.*|
    .*\.log
  )$
